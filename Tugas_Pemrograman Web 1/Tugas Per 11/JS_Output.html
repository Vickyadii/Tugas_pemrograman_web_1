<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Praktikum JS - Output JavaScript</title>
</head>
<body>
    <h2>Dokumentasi Berbagai Metode Output JavaScript</h2>
    
    <div id="display-html" style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;"></div>

    <script>
        let ringkasanStatus = "Transaksi Sukses! Pelanggan berhak mendapatkan benefit.";

        // 1. Output melalui innerHTML (Mengubah isi elemen HTML spesifik - Paling Direkomendasikan)
        document.getElementById("display-html").innerHTML = "<strong>Output via innerHTML:</strong> " + ringkasanStatus;

        // 2. Output melalui console.log() (Muncul di Developer Tools / Inspect Element - Untuk Debugging)
        console.log("Log Transaksi: " + ringkasanStatus);

        // 3. Output melalui alert() (Muncul sebagai pop-up box di browser)
        alert("Notifikasi Sistem: \n" + ringkasanStatus);

        // 4. Output melalui document.write() (Menulis langsung ke dokumen HTML setelah diload)
        document.write("<p style='color: green;'><i>Output via document.write: Berhasil dicetak di akhir halaman.</i></p>");
    </script>
</body>
</html>
