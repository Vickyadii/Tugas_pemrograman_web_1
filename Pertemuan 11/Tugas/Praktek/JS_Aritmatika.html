<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Praktikum JS - Operator Aritmatika</title>
</head>
<body>
    <h2>Dokumentasi Operator Aritmatika</h2>
    <div id="output-aritmatika"></div>

    <script>
        // Data transaksi awal
        let hargaProduk = 150000;
        let kuantitas = 3;
        let diskonLangsung = 25000;

        // Implementasi Operator Aritmatika
        let totalKotor = hargaProduk * kuantitas; // Perkalian (*)
        let totalSetelahDiskon = totalKotor - diskonLangsung; // Pengurangan (-)
        let pajak = totalSetelahDiskon * 0.11; // Perkalian (*) untuk PPN 11%
        let totalAkhir = totalSetelahDiskon + pajak; // Penjumlahan (+)

        // Menampilkan hasil sementara ke halaman
        document.getElementById("output-aritmatika").innerHTML = `
            <p>Harga per Item: Rp ${hargaProduk} x ${kuantitas} pcs</p>
            <p>Subtotal: Rp ${totalKotor}</p>
            <p>Potongan Diskon: -Rp ${diskonLangsung}</p>
            <p>Pajak PPN (11%): +Rp ${pajak}</p>
            <hr>
            <p><b>Total Bersih: Rp ${totalAkhir}</b></p>
        `;
    </script>
</body>
</html>
