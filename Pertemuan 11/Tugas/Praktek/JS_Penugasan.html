<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Praktikum JS - Operator Penugasan</title>
</head>
<body>
    <h2>Dokumentasi Operator Penugasan</h2>
    <div id="output-penugasan"></div>

    <script>
        // Mengambil dasar total akhir dari modul aritmatika sebelumnya (misal: 471750)
        let saldoTagihan = 471750; 

        // 1. Operator += (Penambahan nilai ke variabel diri sendiri)
        saldoTagihan += 12000; // Ditambah ongkos kirim flat

        // 2. Operator -= (Pengurangan nilai dari variabel diri sendiri)
        saldoTagihan -= 5000; // Dikurangi potongan koin loyalty pelanggan

        document.getElementById("output-penugasan").innerHTML = `
            <p>Mekanisme Update Saldo Tagihan:</p>
            <ul>
                <li>Ditambah Ongkir (+12000)</li>
                <li>Dikurangi Koin Loyalty (-5000)</li>
            </ul>
            <hr>
            <p><b>Total Tagihan Baru: Rp ${saldoTagihan}</b></p>
        `;
    </script>
</body>
</html>
