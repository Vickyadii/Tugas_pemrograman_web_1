<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Praktikum JS - Gabungan Operator</title>
</head>
<body>
    <h2>Dokumentasi Gabungan Operator (Logika & Pembanding)</h2>
    <div id="output-gabungan"></div>

    <script>
        // Variabel kondisi berdasarkan data sebelumnya
        let totalBelanja = 478750;
        let punyaVoucherKategori = true;
        let statusMember = "PLATINUM";

        // Kombinasi Pembanding dan Logika
        // Aturan 1: Dapat Free Ongkir jika belanja > 400.000 DAN status member adalah PLATINUM
        let dapatFreeOngkir = (totalBelanja > 400000) && (statusMember === "PLATINUM");

        // Aturan 2: Dapat Cashback jika belanja > 500.000 ATAU memiliki voucher kategori khusus
        let dapatCashback = (totalBelanja > 500000) || (punyaVoucherKategori === true);

        document.getElementById("output-gabungan").innerHTML = `
            <p><b>Hasil Analisis Gabungan Logika:</b></p>
            <p>1. Memenuhi syarat Free Ongkir (Belanja > 400rb AND Member Platinum): <b>${dapatFreeOngkir}</b></p>
            <p>2. Memenuhi syarat Cashback (Belanja > 500rb OR Punya Voucher): <b>${dapatCashback}</b></p>
        `;
    </script>
</body>
</html>
